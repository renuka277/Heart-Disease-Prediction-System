<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Heart Disease Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container py-5">

    <div class="card shadow-lg">

        <div class="text-center mb-4">

            <h1>❤️ Heart Disease Prediction</h1>

            <p class="lead">Fill the patient information below</p>

        </div>

        <form action="/predict" method="POST">

            <!-- PERSONAL INFORMATION -->

            <h4 class="section-title">
                <i class="bi bi-person-fill"></i>
                Personal Information
            </h4>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Age</label>
                    <input type="number" name="age" class="form-control" required min="1" max="120">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>

                    <select name="sex" class="form-select" required>

                        <option value="">Select Gender</option>

                        <option>Male</option>

                        <option>Female</option>

                    </select>

                </div>

            </div>

            <hr>

            <!-- CLINICAL INFORMATION -->

            <h4 class="section-title">
                <i class="bi bi-heart-pulse-fill"></i>
                Clinical Information
            </h4>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">Chest Pain Type</label>

                    <select name="chest_pain_type" class="form-select" required>

                        <option value="">Select</option>

                        <option>Typical Angina</option>

                        <option>Atypical Angina</option>

                        <option>Non-anginal Pain</option>

                        <option>Asymptomatic</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">Maximum Heart Rate</label>

                    <input type="number"
                           class="form-control"
                           name="Max_heart_rate"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Exercise-Induced Angina
                    </label>

                    <select
                        class="form-select"
                        name="exercise_induced_angina"
                        required>

                        <option value="">Select</option>

                        <option>Yes</option>

                        <option>No</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Oldpeak

                    </label>

                    <input
                        type="number"
                        step="0.1"
                        class="form-control"
                        name="oldpeak"
                        required>

                </div>

            </div>

            <hr>

            <!-- MEDICAL INFORMATION -->

            <h4 class="section-title">
                <i class="bi bi-hospital-fill"></i>
                Medical Information
            </h4>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Slope

                    </label>

                    <select
                        class="form-select"
                        name="slope"
                        required>

                        <option value="">Select</option>

                        <option>Upsloping</option>

                        <option>Flat</option>

                        <option>Downsloping</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Major Vessels

                    </label>

                    <select
                        class="form-select"
                        name="vessels_colored_by_flourosopy"
                        required>

                        <option value="">Select</option>

                        <option>0</option>

                        <option>1</option>

                        <option>2</option>

                        <option>3</option>

                    </select>

                </div>

                <div class="col-md-12 mb-4">

                    <label class="form-label">

                        Thalassemia

                    </label>

                    <select
                        class="form-select"
                        name="thalassemia"
                        required>

                        <option value="">Select</option>

                        <option>Normal</option>

                        <option>Fixed Defect</option>

                        <option>Reversible Defect</option>

                    </select>

                </div>

            </div>

            <div class="text-center">

                <button
                    class="btn btn-danger btn-lg">

                    <i class="bi bi-heart-pulse-fill"></i>

                    Predict Risk

                </button>

                <a href="/"
                   class="btn btn-secondary btn-lg ms-2">

                    Home

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
